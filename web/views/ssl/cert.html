<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>SSL 证书状态(Let's Encrypt via ACME)</h5>
                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                        <a class="close-link">
                            <i class="fa fa-times"></i>
                        </a>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="alert alert-info">
                        <strong>使用说明:</strong> 启用 host 的"自动 SSL"后,nps 会自动调用 Let's Encrypt 签证书并部署。
                        状态每 10 秒自动刷新。
                    </div>
                    <div id="toolbar">
                        <a href="/ssl/index" class="btn btn-primary dim">
                            <i class="fa fa-fw fa-lg fa-cog"></i> DNS 凭证配置
                        </a>
                        <a href="javascript:location.reload();" class="btn btn-info dim">
                            <i class="fa fa-fw fa-lg fa-refresh"></i> 刷新
                        </a>
                    </div>
                    <table class="table table-striped table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>域名</th>
                                <th>状态</th>
                                <th>过期时间</th>
                                <th>剩余天数</th>
                                <th>绑定 Host</th>
                                <th>最近错误</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="cert-tbody">
                            <tr><td colspan="7" class="text-center text-muted">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
var statusBadge = function(s) {
    var map = {
        'pending':   '<span class="label label-warning">申请中</span>',
        'issued':    '<span class="label label-success">已签</span>',
        'renewing':  '<span class="label label-info">续期中</span>',
        'failed':    '<span class="label label-danger">失败</span>',
        'expired':   '<span class="label label-default">已过期</span>'
    };
    return map[s] || ('<span class="label">' + s + '</span>');
};

var fmtTime = function(unix) {
    if (!unix || unix <= 0) return '-';
    var d = new Date(unix * 1000);
    var pad = function(n) { return n < 10 ? '0' + n : n; };
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
};

var loadCerts = function() {
    $.post('/ssl/certlistjson', function(r) {
        var tbody = $('#cert-tbody');
        if (!r || !r.rows || r.rows.length === 0) {
            tbody.html('<tr><td colspan="7" class="text-center text-muted">还没有证书记录。启用 host 的"自动 SSL"后会自动出现在这里。</td></tr>');
            return;
        }
        var html = '';
        r.rows.forEach(function(c) {
            var days = c.expires_in_days;
            var daysHtml = '-';
            if (days !== undefined && c.expires_at > 0) {
                if (days < 0) {
                    daysHtml = '<span class="text-danger">已过期 ' + Math.abs(days) + ' 天</span>';
                } else if (days <= 30) {
                    daysHtml = '<span class="text-warning">' + days + ' 天</span>';
                } else {
                    daysHtml = '<span class="text-success">' + days + ' 天</span>';
                }
            }
            var hostInfo = c.host_count > 0
                ? c.host_count + ' 个 host (id: ' + c.host_ids.join(',') + ')'
                : '<span class="text-muted">无</span>';
            var reissueBtn = (c.status === 'failed' || c.status === 'expired')
                ? '<button class="btn btn-warning btn-xs cert-reissue" data-domain="' + c.domain + '">重签</button>'
                : '<button class="btn btn-info btn-xs cert-reissue" data-domain="' + c.domain + '">重新签发</button>';
            html += '<tr>' +
                '<td><code>' + c.domain + '</code></td>' +
                '<td>' + statusBadge(c.status) + '</td>' +
                '<td>' + fmtTime(c.expires_at) + '</td>' +
                '<td>' + daysHtml + '</td>' +
                '<td>' + hostInfo + '</td>' +
                '<td><code class="text-danger" style="font-size:11px">' + (c.last_error || '-') + '</code></td>' +
                '<td>' + reissueBtn + '</td>' +
                '</tr>';
        });
        tbody.html(html);
    });
};

$(function() {
    loadCerts();
    setInterval(loadCerts, 10000);
    $(document).on('click', '.cert-reissue', function() {
        var domain = $(this).data('domain');
        if (!confirm('确认重新签发 ' + domain + ' 的证书?\n旧证书会被删除,需要等 30s-2min 完成。')) return;
        var btn = $(this);
        btn.prop('disabled', true).text('处理中...');
        $.post('/ssl/reissue', {domain: domain}, function(r) {
            alert(r.msg || (r.status === 1 ? '成功' : '失败'));
            btn.prop('disabled', false).text('重新签发');
            loadCerts();
        });
    });
});
</script>
