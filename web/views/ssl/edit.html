<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>{{if .cfg.Id}}编辑{{else}}新增{{end}} SSL 配置</h5>
            </div>
            <div class="ibox-content">
                <form class="form-horizontal" id="ssl-form">
                    <input type="hidden" name="id" value="{{.cfg.Id}}" />
                    <div class="form-group">
                        <label class="col-sm-2 control-label">配置名称</label>
                        <div class="col-sm-10">
                            <input class="form-control" name="name" required value="{{.cfg.Name}}" placeholder="如:我的阿里云生产证书" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">DNS 厂商</label>
                        <div class="col-sm-10">
                            <select class="form-control" name="provider" id="provider-select">
                                {{range $k, $v := .providers}}
                                <option value="{{$k}}" {{if eq $k $.cfg.Provider}}selected{{end}}>{{$v}}</option>
                                {{end}}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">
                            <span id="keyid-label">AccessKeyId / API Token</span>
                        </label>
                        <div class="col-sm-10">
                            <input class="form-control" name="key_id" value="{{.cfg.KeyID}}" placeholder="不同厂商字段不同,详见说明" />
                            <span class="help-block m-b-none">
                                <strong>阿里云:</strong> AccessKeyId<br/>
                                <strong>腾讯云:</strong> SecretId<br/>
                                <strong>华为云:</strong> Access Key Id(AK)<br/>
                                <strong>Cloudflare:</strong> Zone ID(写到 Extra 字段)+ API Token(下方)
                            </span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">API Secret</label>
                        <div class="col-sm-10">
                            <input class="form-control" type="password" name="key_secret" placeholder="留空表示不修改" />
                            <span class="help-block m-b-none text-warning">
                                敏感字段,AES 加密后存储;建议使用 DNS 厂商的 RAM / IAM 子账号凭证,只授予 DNS 解析权限。
                            </span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 control-label">扩展字段(可选)</label>
                        <div class="col-sm-10">
                            <input class="form-control" name="extra" value="{{.cfg.Extra}}" placeholder='JSON 格式,比如 Cloudflare Zone ID' />
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-sm-4 col-sm-offset-2">
                            <button class="btn btn-primary" type="submit">保存</button>
                            <a class="btn btn-default" href="/ssl/index">取消</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
$(function() {
    $('#ssl-form').on('submit', function(e) {
        e.preventDefault();
        $.post('/ssl/save', $(this).serialize(), function(r) {
            if (r.status === 1) {
                location.href = '/ssl/index';
            } else {
                alert(r.msg || '保存失败');
            }
        });
    });
});
</script>
